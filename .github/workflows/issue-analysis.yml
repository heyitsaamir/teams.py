# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json

name: "Issue Analysis → Teams"

on:
  issues:
    types: [opened]
  workflow_dispatch:
    inputs:
      issue_number:
        description: "Issue number to analyze"
        required: true
        type: number

# Declare default permissions as read only.
permissions: read-all

jobs:
  analyze-and-notify:
    name: Analyze Issue & Notify Teams
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.issue.performed_via_github_app == null

    permissions:
      issues: read
      contents: read
      models: read

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@0080882f6c36860b6ba35c610c98ce87d4e2f26f # v2.10.2
        with:
          egress-policy: audit

      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install Python dependencies
        run: |
          uv venv .venv
          uv pip install --python .venv/bin/python openai microsoft-teams-apps microsoft-teams-cards

      - name: Install Copilot CLI
        run: npm install -g @github/copilot

      - name: Resolve issue details
        id: issue
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            # Fetch issue from API
            ISSUE=$(gh api repos/microsoft/teams.py/issues/${{ inputs.issue_number }})
            echo "number=$(echo "$ISSUE" | jq -r '.number')" >> "$GITHUB_OUTPUT"
            echo "title=$(echo "$ISSUE" | jq -r '.title')" >> "$GITHUB_OUTPUT"
            echo "author=$(echo "$ISSUE" | jq -r '.user.login')" >> "$GITHUB_OUTPUT"
            echo "html_url=$(echo "$ISSUE" | jq -r '.html_url')" >> "$GITHUB_OUTPUT"
            echo "labels=$(echo "$ISSUE" | jq -r '[.labels[].name] | join(",")')" >> "$GITHUB_OUTPUT"
            # Body can be multiline — use a delimiter
            echo "body<<BODY_EOF" >> "$GITHUB_OUTPUT"
            echo "$ISSUE" | jq -r '.body // ""' >> "$GITHUB_OUTPUT"
            echo "BODY_EOF" >> "$GITHUB_OUTPUT"
          else
            echo "number=${{ github.event.issue.number }}" >> "$GITHUB_OUTPUT"
            echo "title=${{ github.event.issue.title }}" >> "$GITHUB_OUTPUT"
            echo "author=${{ github.event.issue.user.login }}" >> "$GITHUB_OUTPUT"
            echo "html_url=${{ github.event.issue.html_url }}" >> "$GITHUB_OUTPUT"
            echo "labels=$(echo '${{ toJSON(github.event.issue.labels) }}' | jq -r '[.[].name] | join(",")')" >> "$GITHUB_OUTPUT"
            echo "body<<BODY_EOF" >> "$GITHUB_OUTPUT"
            echo "${{ github.event.issue.body }}" >> "$GITHUB_OUTPUT"
            echo "BODY_EOF" >> "$GITHUB_OUTPUT"
          fi

      - name: Analyze issue with Copilot CLI
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_PAT }}
          GITHUB_UPSTREAM_REPO: microsoft/teams.py
        run: |
          ISSUE_NUMBER="${{ steps.issue.outputs.number }}"
          ISSUE_URL="https://github.com/${GITHUB_UPSTREAM_REPO}/issues/${ISSUE_NUMBER}"

          copilot -p "You are analyzing GitHub issue #${ISSUE_NUMBER} for the Microsoft Teams Python SDK.

          Issue URL: ${ISSUE_URL}

          Read the codebase to understand the architecture, then provide a concrete action plan in markdown:
          1. **Root cause** — What's likely going wrong or what's missing
          2. **Files to investigate** — Specific file paths to look at (use actual paths you found)
          3. **Proposed approach** — Step-by-step what a developer should do to resolve this
          4. **Estimated complexity** — Small (< 1 day), Medium (1-3 days), or Large (3+ days)

          Be specific. Reference actual files and code you found in the repo." \
            --allow-tool='shell(git:*)' \
            --allow-tool='read' \
            --allow-tool='glob' \
            --allow-tool='grep' \
            --no-ask-user > /tmp/raw_analysis.txt

          # Strip tool call lines (● prefix and └ prefix) to get just the analysis
          python3 -c "
          import sys
          lines = open('/tmp/raw_analysis.txt').readlines()
          # Find the last block of non-tool-call text
          result = []
          in_result = False
          for line in lines:
              stripped = line.strip()
              if stripped.startswith('●') or stripped.startswith('└') or stripped.startswith('│'):
                  in_result = False
                  result = []
              else:
                  in_result = True
                  result.append(line)
          # Write the final analysis block
          sys.stdout.write(''.join(result).strip())
          " > /tmp/analysis.txt

          echo "--- Copilot analysis ---"
          cat /tmp/analysis.txt

      - name: Triage and notify Teams
        env:
          CLIENT_ID: ${{ secrets.TEAMS_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.TEAMS_CLIENT_SECRET }}
          TENANT_ID: ${{ secrets.TEAMS_TENANT_ID }}
          TEAMS_CONVERSATION_ID: ${{ secrets.TEAMS_CONVERSATION_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_UPSTREAM_REPO: microsoft/teams.py
          COPILOT_ANALYSIS_FILE: /tmp/analysis.txt
          ISSUE_NUMBER: ${{ steps.issue.outputs.number }}
          ISSUE_TITLE: ${{ steps.issue.outputs.title }}
          ISSUE_AUTHOR: ${{ steps.issue.outputs.author }}
          ISSUE_HTML_URL: ${{ steps.issue.outputs.html_url }}
          ISSUE_LABELS: ${{ steps.issue.outputs.labels }}
          ISSUE_BODY: ${{ steps.issue.outputs.body }}
        run: .venv/bin/python .github/scripts/analyze_issue.py
