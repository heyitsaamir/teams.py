# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json

name: "Issue Analysis → Teams"

on:
  issues:
    types: [opened]
  workflow_dispatch:
    inputs:
      issue_number:
        description: "Issue number to analyze"
        required: true
        type: number

# Declare default permissions as read only.
permissions: read-all

jobs:
  analyze-and-notify:
    name: Analyze Issue & Notify Teams
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.issue.performed_via_github_app == null

    permissions:
      issues: read
      contents: read
      models: read

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@0080882f6c36860b6ba35c610c98ce87d4e2f26f # v2.10.2
        with:
          egress-policy: audit

      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          sparse-checkout: .github/scripts

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv pip install --system openai microsoft-teams-apps microsoft-teams-cards

      - name: Analyze issue and notify Teams
        env:
          CLIENT_ID: ${{ secrets.TEAMS_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.TEAMS_CLIENT_SECRET }}
          TENANT_ID: ${{ secrets.TEAMS_TENANT_ID }}
          TEAMS_CONVERSATION_ID: ${{ secrets.TEAMS_CONVERSATION_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ inputs.issue_number }}
        run: python .github/scripts/analyze_issue.py
